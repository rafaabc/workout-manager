name: CI - API Tests

env:
  SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Code Checkout
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20.x'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint

      - name: Format check
        run: npm run format -- --check

      - name: Audit dependencies
        run: npm run audit

      - name: Run API
        run: npm start &

      - name: Wait API startup
        run: |
          for i in {1..20}; do
            if nc -z localhost 3000; then
              echo "API is running"
              break
            fi
            echo "Waiting for API..."
            sleep 2
          done

      - name: Define BASE_URL for tests
        run: echo "BASE_URL=http://localhost:3000" >> $GITHUB_ENV

      - name: Run tests
        run: npm test

      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@v2
