<div class="auth-container">
  <div class="auth-box">
    <h1>Workout Manager</h1>
    <h2>Register</h2>

    <form id="registerForm" class="auth-form">
      <div class="form-group">
        <label for="username">Username</label>
        <input
          type="text"
          id="username"
          name="username"
          placeholder="Enter a username (min. 3 characters)"
          autocomplete="username"
          required
        />
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input
          type="password"
          id="password"
          name="password"
          placeholder="Enter a password (min. 8 characters, letters and numbers)"
          autocomplete="new-password"
          required
        />
      </div>

      <div class="form-group">
        <label for="confirmPassword">Confirm Password</label>
        <input
          type="password"
          id="confirmPassword"
          name="confirmPassword"
          placeholder="Confirm your password"
          autocomplete="new-password"
          required
        />
      </div>

      <div id="errorMessage" class="error-message" style="display: none"></div>

      <button type="submit" class="btn-primary">Register</button>
    </form>

    <div class="auth-footer">
      <p>Already have an account? <a href="index.html?page=login">Login here</a></p>
    </div>
  </div>
</div>
