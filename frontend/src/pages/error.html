<div class="auth-container">
  <div class="auth-box">
    <h2>Oops!</h2>
    <p>There was a problem connecting to the server.</p>
    <p>Please check your internet connection or try again later.</p>

    window.location.href = 'index.html?page=login';
  });
</script>
